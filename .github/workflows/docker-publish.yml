name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.platform }}-

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image with bootBuildImage
        run: ./gradlew bootBuildImage -PimageName=kasbench/globeco-trade-service:${{ github.sha }}-${{ matrix.platform }}

      - name: Push architecture-specific image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push kasbench/globeco-trade-service:${{ github.sha }}-${{ matrix.platform }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push SHA-tagged manifest
        run: |
          docker manifest create kasbench/globeco-trade-service:${{ github.sha }} \
            kasbench/globeco-trade-service:${{ github.sha }}-amd64 \
            kasbench/globeco-trade-service:${{ github.sha }}-arm64
          docker manifest push kasbench/globeco-trade-service:${{ github.sha }}

      - name: Create and push latest manifest
        run: |
          docker manifest create kasbench/globeco-trade-service:latest \
            kasbench/globeco-trade-service:${{ github.sha }}-amd64 \
            kasbench/globeco-trade-service:${{ github.sha }}-arm64
          docker manifest push kasbench/globeco-trade-service:latest

      - name: Logout from DockerHub
        if: always()
        run: docker logout
